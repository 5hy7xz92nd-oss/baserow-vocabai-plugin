session_name: vocab-words
start_directory: ./ # load session relative to config location (project root).
shell_command_before:
  - cmd: source env.dev.sh
  - cmd: source ${SECRETS_DIR}/cloudlanguagetools/cloudlanguagetools_core_secret.sh
  # - cmd: source ${SECRETS_DIR}/vocab_words/dev.sh
  - cmd: source .bash_aliases
  - cmd: clear
windows:
- window_name: docker
  focus: true
- window_name: logs
- window_name: logs_inspect
- window_name: ai
- window_name: git
- window_name: tests
- window_name: patches
  panes:
    - shell_command: 
      - cd ~/code/python/baserow-vocabai-patches
      - source .bash_aliases
      - clear
